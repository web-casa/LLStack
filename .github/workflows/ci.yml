name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      run_docker_smoke:
        description: "Run the full Docker functional smoke matrix"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      VERSION: 0.1.0-ci
      PLATFORMS: linux/amd64 linux/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: |
          LLSTACK_RUN_SIGN=0 \
          LLSTACK_REQUIRE_V_PREFIX=0 \
          make release-pipeline VERSION="${VERSION}" PLATFORMS="${PLATFORMS}" MODE=validate

      - name: Validate Docker compose definition
        run: docker compose -f docker/compose/functional.yaml config -q

      - name: List Docker smoke services
        run: docker compose -f docker/compose/functional.yaml config --services

      - name: Sign release artifacts
        if: ${{ secrets.RELEASE_SIGNING_KEY != '' && secrets.RELEASE_SIGNING_PUBKEY != '' }}
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
          RELEASE_SIGNING_PUBKEY: ${{ secrets.RELEASE_SIGNING_PUBKEY }}
        run: |
          umask 077
          printf '%s\n' "${RELEASE_SIGNING_KEY}" > release-private.pem
          printf '%s\n' "${RELEASE_SIGNING_PUBKEY}" > release-public.pem
          LLSTACK_RUN_TESTS=0 \
          LLSTACK_RUN_BUILD=0 \
          LLSTACK_RUN_SIGN=1 \
          LLSTACK_RUN_VERIFY=1 \
          LLSTACK_RUN_NOTES=1 \
          LLSTACK_SIGNING_KEY="${PWD}/release-private.pem" \
          LLSTACK_SIGNING_PUBKEY="${PWD}/release-public.pem" \
          LLSTACK_VERIFY_PUBKEY="${PWD}/release-public.pem" \
          LLSTACK_REQUIRE_SIGNATURES=1 \
          LLSTACK_REQUIRE_V_PREFIX=0 \
          make release-pipeline VERSION="${VERSION}" PLATFORMS="${PLATFORMS}" MODE=validate

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llstack-release-${{ env.VERSION }}
          path: |
            dist/releases/${{ env.VERSION }}
            dist/packages/${{ env.VERSION }}

  docker-functional-smoke:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_docker_smoke }}
    runs-on: ubuntu-latest
    env:
      VERSION: 0.1.0-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run Docker functional smoke matrix
        run: make docker-smoke VERSION="${VERSION}"

      - name: Upload Docker smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llstack-docker-smoke-${{ env.VERSION }}
          path: dist/docker-smoke
