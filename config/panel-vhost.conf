# LLStack Panel - LiteHttpd vhost configuration
# Place at: /usr/local/lsws/conf/vhosts/llstack-panel/vhconf.conf

docRoot                   /opt/llstack/web/dist

extprocessor llstack_backend {
  type                    proxy
  address                 127.0.0.1:8001
  maxConns                200
  pcKeepAliveTimeout      300
  initTimeout             60
  retryTimeout            0
  persistConn             1
  respBuffer              0
}

# API requests → Flask backend
context /api/ {
  type                    proxy
  handler                 llstack_backend
  addDefaultCharset       off
}

# WebSocket terminal → Flask backend
context /ws/ {
  type                    proxy
  handler                 llstack_backend
  addDefaultCharset       off
}

# SPA rewrite: all non-file, non-API requests → index.html
rewrite {
  enable                  1
  logLevel                0
  rules                   <<<END_rules
  RewriteCond %{REQUEST_URI} !^/api/
  RewriteCond %{REQUEST_URI} !^/ws/
  RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-f
  RewriteCond %{DOCUMENT_ROOT}%{REQUEST_URI} !-d
  RewriteRule ^ /index.html [L]
  END_rules
}

index {
  useServer               0
  indexFiles              index.html
}

# Security headers (applied to all responses)
context / {
  type                    NULL
  addDefaultCharset       off
  extraHeaders            <<<END_hdrs
  Header always set X-Content-Type-Options "nosniff"
  Header always set X-Frame-Options "SAMEORIGIN"
  Header always set X-XSS-Protection "1; mode=block"
  Header always set Referrer-Policy "strict-origin-when-cross-origin"
  Header always set Permissions-Policy "geolocation=(), microphone=(), camera=()"
  END_hdrs
}
