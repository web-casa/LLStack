vhRoot                   /data/www/example.com

docRoot                  /data/www/example.com

index  {
  useServer               0
  indexFiles              index.php, index.html
}

errorlog /var/log/llstack/sites/example.com.error.log {
  useServer               0
  logLevel                WARN
}
accesslog /var/log/llstack/sites/example.com.access.log {
  useServer               0
  logFormat               combined
}

extprocessor lsphp-example-com {
  type                    lsapi
  address                 uds://tmp/lshttpd/example.com.sock
  maxConns                10
  env                     PHP_LSAPI_CHILDREN=10
  initTimeout             60
  retryTimeout            0
  persistConn             1
  pcKeepAliveTimeout      60
  respBuffer              0
  autoStart               1
  path                    /usr/bin/lsphp-83
  backlog                 100
  instances               1
  priority                0
  memSoftLimit            2047M
  memHardLimit            2047M
  procSoftLimit           400
  procHardLimit           500
}

scripthandler  {
  add                     lsapi:lsphp-example-com php
}

rewrite  {
  enable                  1
  autoLoadHtaccess        1
  rules                   RewriteRule ^ https://example.com%{REQUEST_URI} [R=301,L]
  rules                   RewriteRule ^/old$ /new [R=302,L]
}

context api {
  type                    proxy
  location                /api/
  handler                 http://127.0.0.1:9000/
  addDefaultCharset       off
}

vhssl  {
  keyFile                 /etc/pki/tls/private/example.com.key
  certFile                /etc/pki/tls/certs/example.com.crt
}
