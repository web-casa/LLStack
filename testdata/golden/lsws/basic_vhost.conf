# Managed by LLStack for LiteSpeed Enterprise
<VirtualHost *:80>
    ServerName example.com
    ServerAlias www.example.com
    DocumentRoot /data/www/example.com
    DirectoryIndex index.php index.html
    ErrorLog /var/log/llstack/sites/example.com.error.log
    CustomLog /var/log/llstack/sites/example.com.access.log combined
    RewriteEngine On
    RewriteRule ^ https://example.com%{REQUEST_URI} [R=301,L]
    <Directory /data/www/example.com>
        AllowOverride All
        Require all granted
    </Directory>
    <IfModule LiteSpeed>
    LSPHP_ProcessGroup on
    LSPHP_Workers 10
    LSPHP_Command /usr/bin/lsphp-84
    </IfModule>
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/tmp/lshttpd/example.com.sock|fcgi://localhost"
    </FilesMatch>
    RewriteRule ^/old$ /new [R=302,L]
    ProxyPass /api/ http://127.0.0.1:9000/
    ProxyPassReverse /api/ http://127.0.0.1:9000/
    CacheEngine on
    # feature flag: quic available
</VirtualHost>

<VirtualHost *:443>
    ServerName example.com
    DocumentRoot /data/www/example.com
    SSLCertificateFile /etc/pki/tls/certs/example.com.crt
    SSLCertificateKeyFile /etc/pki/tls/private/example.com.key
</VirtualHost>
